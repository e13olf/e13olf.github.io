<!DOCTYPE html>
<html>
	
<head>
    <title>e13olf</title>
    <meta charset="UTF-8">
    <meta name="author" content="https://twitter.com/e13olf">
    <meta name="contact" content="e13olf@gmail.com">

    <link rel="stylesheet" type="text/css" href="resources/css/font-awesome.min.css">
    <link rel="stylesheet" type="text/css" href="resources/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="resources/css/layout.css">
    <link rel="shortcut icon" type="image/jpg" href="resources/images/wolf-head.png"/>

    <script type="text/javascript" src="resources/js/jquery-1.10.2.min.js"></script>
    <script type='text/javascript' src="resources/js/bootstrap.min.js"></script>
</head>

<body>
    <script type="text/javascript">
        $(window).load(function(){
        $('.popoverData').popover();
        });
        $(function(){
        function distributeFields() {
            var radius = ($('#archetype').height() / 2) + 63;
            var fields = $('.btn'), container = $('#circle'),
                width = container.width(), height = container.height(),
                step = (2*Math.PI) / fields.length, angle = 90 + step*2.7;
            fields.each(function() {
                var x = Math.round(width/2 + radius * Math.cos(angle) - $(this).width()/2);
                var y = Math.round(height/2 + radius * Math.sin(angle) - $(this).height()/2);
                if(window.console) {
                    console.log($(this).text(), x, y);
                }
                $(this).css({
                    left: x + 'px',
                    top: y + 'px'
                });
                angle += step;
            });
        }
        distributeFields();
        });
    </script> 

    <div id="content">
        <div id="circle">
            <a href="https://e13olf.blogspot.com" target="_blank">
            <img src="resources/images/archetype.jpg" alt="e13olf" id="archetype" >
            </a>

            <div id="moon-phases">
                <a class="btn popoverData" data-content="full moon" rel="popover" data-placement="left" data-trigger="hover">
                <img src="resources/images/full_moon.jpeg" alt="Full Moon">
                </a>

                <a class="btn popoverData" data-content="waning gibbous" rel="popover" data-placement="top" data-trigger="hover">
                <img src="resources/images/waning_gibbous.jpeg" alt="Waning Gibbous">
                </a>

                <a class="btn popoverData" data-content="last quarter" rel="popover" data-placement="right" data-trigger="hover">
                <img src="resources/images/last_quarter.jpeg" alt="Last Quarter">
                </a>

                <a class="btn popoverData" data-content="waning cresent" rel="popover" data-placement="right" data-trigger="hover">
                <img src="resources/images/waning_crescent.jpeg" alt="Waning Crescent">
                </a>

                <a class="btn popoverData" data-content="new moon" rel="popover" data-placement="right" data-trigger="hover">
                <img src="resources/images/new_moon.jpeg" alt="New Moon">
                </a>

                <a class="btn popoverData" data-content="waxing cresent" rel="popover" data-placement="bottom" data-trigger="hover">
                <img src="resources/images/waxing_cresent.jpeg" alt="Waxing Cresent">
                </a>

                <a class="btn popoverData" data-content="first quarter" rel="popover" data-placement="left" data-trigger="hover">
                <img src="resources/images/1st_quarter.jpeg" alt="First Quarter">
                </a>

                <a class="btn popoverData" data-content="waxing gibbous" rel="popover" data-placement="left" data-trigger="hover">
                <img src="resources/images/waxing_gibbous.jpeg" alt="Waxing Gibbous">
                </a>
            </div>
        </div>

        <div id="about">
            <audio crossorigin="anonymous"></audio>
            <audio src="resources/audio/STE-015.mp3" autoplay></audio>  
                <script>
                    const audio = document.querySelector("audio");
                    function Autoplay() {
                        audio.autoplay = true;
                        audio.load();  
                    }
                </script>
        </div>
    </div>
</body>	
</html>
